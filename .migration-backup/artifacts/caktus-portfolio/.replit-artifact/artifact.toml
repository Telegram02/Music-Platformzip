kind = "web"
previewPath = "/"
title = "Caktus Portfolio"
version = "1.0.0"
id = "artifacts/caktus-portfolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18681

[services.development]
run = "pnpm --filter @workspace/caktus-portfolio run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/caktus-portfolio", "run", "build" ]
publicDir = "artifacts/caktus-portfolio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18681"
BASE_PATH = "/"
